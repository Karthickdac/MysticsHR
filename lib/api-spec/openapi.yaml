components:
  schemas:
    ShiftTemplate:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        shiftType: { type: string, enum: [Fixed, Flexible, Rotational, "Night Shift"] }
        startTime: { type: string }
        endTime: { type: string }
        gracePeriodMinutes: { type: integer }
        breakDurationMinutes: { type: integer }
        minWorkingHoursMinutes: { type: integer }
        weeklyOff: { type: ["array", "null"], items: { type: string } }
        departmentId: { type: ["integer", "null"] }
        shiftRatePerHour: { type: ["string", "null"] }
        nightDifferentialRate: { type: ["string", "null"] }
        overtimeThresholdMinutes: { type: integer }
        isActive: { type: boolean }
        notes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, shiftType, startTime, endTime, gracePeriodMinutes, breakDurationMinutes, minWorkingHoursMinutes, overtimeThresholdMinutes, isActive, createdAt, updatedAt]

    CreateShiftTemplateBody:
      type: object
      required: [name, shiftType, startTime, endTime]
      properties:
        name: { type: string }
        shiftType: { type: string, enum: [Fixed, Flexible, Rotational, "Night Shift"] }
        startTime: { type: string }
        endTime: { type: string }
        gracePeriodMinutes: { type: integer, default: 0 }
        breakDurationMinutes: { type: integer, default: 0 }
        minWorkingHoursMinutes: { type: integer, default: 480 }
        weeklyOff: { type: ["array", "null"], items: { type: string } }
        departmentId: { type: ["integer", "null"] }
        shiftRatePerHour: { type: ["string", "null"] }
        nightDifferentialRate: { type: ["string", "null"] }
        overtimeThresholdMinutes: { type: integer, default: 30 }
        isActive: { type: boolean, default: true }
        notes: { type: ["string", "null"] }

    ShiftAssignment:
