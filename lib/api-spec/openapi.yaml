      responses:
        "201":
          description: Created/Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/{id}:
    get:
      summary: Get attendance record
      tags: [Attendance]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Attendance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
    patch:
      summary: HR override attendance record
      tags: [Attendance]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceOverrideBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /employees/{id}/attendance:
    get:
      summary: Get employee attendance records
      tags: [Attendance]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: month, in: query, schema: { type: string, description: "YYYY-MM" } }
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/summary:
    get:
      summary: Monthly attendance summary for all employees
      tags: [Attendance]
      parameters:
        - { name: month, in: query, required: true, schema: { type: string, description: "YYYY-MM" } }
        - { name: departmentId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceMonthlySummary"

  /attendance/regularizations:
    get:
      summary: List regularization requests
      tags: [Attendance]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [Pending, Approved, Rejected] } }
        - { name: employeeId, in: query, schema: { type: integer } }
        - { name: month, in: query, schema: { type: string, description: "YYYY-MM" } }
      responses:
        "200":
          description: Regularization requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRegularization"
    post:
      summary: Submit regularization request
      tags: [Attendance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRegularizationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRegularization"

  /attendance/regularizations/{id}/action:
    post:
      summary: HOD approves or rejects regularization
      tags: [Attendance]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegularizationActionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRegularization"

  /employees/{id}/overtime:
    get:
      summary: Get employee overtime records
      tags: [Attendance]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
