openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MysticsHR API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: departments
    description: Department management
  - name: designations
    description: Designation management
  - name: employees
    description: Employee management
  - name: users
    description: User management
  - name: roles
    description: Role definitions
  - name: requisitions
    description: Job requisitions
  - name: candidates
    description: Recruitment candidates
  - name: interviews
    description: Interview scheduling and feedback
  - name: offers
    description: Offer letters
  - name: pre-onboarding
    description: Pre-onboarding documents and verification
  - name: audit-logs
    description: Audit log access
  - name: dashboard
    description: Dashboard and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ──────────────────────────────────────────────
  # DASHBOARD
  # ──────────────────────────────────────────────
  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      tags: [dashboard]
      summary: Get executive KPI dashboard metrics
      responses:
        "200":
          description: KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      summary: Get recent HR activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/headcount-by-department:
    get:
      operationId: getDashboardHeadcountByDepartment
      tags: [dashboard]
      summary: Headcount grouped by department
      responses:
        "200":
          description: Headcount per department
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeadcountByDepartment"

  /dashboard/employee-status-breakdown:
    get:
      operationId: getDashboardEmployeeStatusBreakdown
      tags: [dashboard]
      summary: Employee count by status
      responses:
        "200":
          description: Status breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  # ──────────────────────────────────────────────
  # DEPARTMENTS
  # ──────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentBody"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get a department by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "404":
          description: Not found
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentBody"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────────────────────────────────────
  # DESIGNATIONS
  # ──────────────────────────────────────────────
  /designations:
    get:
      operationId: listDesignations
      tags: [designations]
      summary: List all designations
      parameters:
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of designations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Designation"
    post:
      operationId: createDesignation
      tags: [designations]
      summary: Create a designation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDesignationBody"
      responses:
        "201":
          description: Designation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"

  /designations/{id}:
    get:
      operationId: getDesignation
      tags: [designations]
      summary: Get a designation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Designation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"
    patch:
      operationId: updateDesignation
      tags: [designations]
      summary: Update a designation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDesignationBody"
      responses:
        "200":
          description: Updated designation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Designation"
    delete:
      operationId: deleteDesignation
      tags: [designations]
      summary: Delete a designation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────────────────────────────────────
  # EMPLOYEES
  # ──────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: departmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get an employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeBody"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Soft-delete (deactivate) an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deactivated

  /employees/bulk-import:
    post:
      summary: Bulk import employees via CSV data
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rows:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
              required: [rows]
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResult"

  /employees/{id}/profile:
    get:
      summary: Get extended employee profile
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Employee profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeProfile"
    put:
      summary: Create or update extended employee profile
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertEmployeeProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeProfile"

  /employees/{id}/education:
    get:
      summary: List employee education records
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Education records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeEducation"
    post:
      summary: Add education record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeEducationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeEducation"

  /employee-education/{id}:
    patch:
      summary: Update education record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeEducationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeEducation"
    delete:
      summary: Delete education record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /employees/{id}/work-experience:
    get:
      summary: List employee work experience
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Work experience records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeWorkExperience"
    post:
      summary: Add work experience record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeWorkExperienceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeWorkExperience"

  /employee-work-experience/{id}:
    patch:
      summary: Update work experience record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeWorkExperienceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeWorkExperience"
    delete:
      summary: Delete work experience record
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /employees/{id}/emp-documents:
    get:
      summary: List employee documents
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeDocument"
    post:
      summary: Upload employee document
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeDocumentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDocument"

  /emp-documents/{id}:
    patch:
      summary: Update employee document
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeDocumentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDocument"
    delete:
      summary: Delete employee document
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /employees/{id}/history:
    get:
      summary: Get employee field change history
      tags: [EmployeeProfiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: History records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeHistory"

  /onboarding/checklists:
    get:
      summary: List onboarding checklists
      tags: [Onboarding]
      parameters:
        - { name: status, in: query, schema: { type: string } }
      responses:
        "200":
          description: Checklist list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OnboardingChecklist"

  /employees/{id}/onboarding-checklist:
    post:
      summary: Create onboarding checklist for employee
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                joiningDate: { type: string, format: date }
                notes: { type: ["string", "null"] }
      responses:
        "201":
          description: Created checklist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingChecklist"
    get:
      summary: Get employee onboarding checklist
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Checklist with tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingChecklistDetail"

  /employees/{id}/onboarding-checklist/welcome-email:
    post:
      summary: Trigger welcome email for employee onboarding
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Welcome email trigger recorded
          content:
            application/json:
              schema:
                type: object
                required: [welcomeEmailSentAt, message]
                properties:
                  welcomeEmailSentAt:
                    type: string
                    format: date-time
                  message:
                    type: string
        "404":
          description: Checklist not found for this employee

  /onboarding/checklists/{id}:
    get:
      summary: Get checklist by ID
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Checklist with tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingChecklistDetail"
    patch:
      summary: Update checklist
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                joiningDate: { type: ["string", "null"], format: date }
                notes: { type: ["string", "null"] }
      responses:
        "200":
          description: Updated checklist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingChecklist"

  /onboarding/checklists/{id}/tasks:
    get:
      summary: List tasks in checklist
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OnboardingTask"
    post:
      summary: Add task to checklist
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOnboardingTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTask"

  /onboarding/tasks/{id}:
    patch:
      summary: Update onboarding task
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOnboardingTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTask"
    delete:
      summary: Delete onboarding task
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /onboarding/tasks/{id}/complete:
    post:
      summary: Mark task as completed
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: ["string", "null"] }
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTask"

  /onboarding/tasks/{id}/uncomplete:
    post:
      summary: Mark task as not completed
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Task uncompleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTask"

  /employees/{id}/induction-sessions:
    get:
      summary: List induction sessions for employee
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InductionSession"
    post:
      summary: Record induction session
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInductionSessionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InductionSession"

  /induction-sessions/{id}:
    patch:
      summary: Update induction session
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInductionSessionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InductionSession"
    delete:
      summary: Delete induction session
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /employees/{id}/id-card:
    get:
      summary: Generate and download employee ID card as PDF
      operationId: downloadEmployeeIdCard
      tags: [Onboarding]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: PDF binary file of the employee ID card
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "403":
          description: Conditions not met — onboarding checklist not 100% complete

  /employees/{id}/status:
    patch:
      operationId: updateEmployeeStatus
      tags: [employees]
      summary: Update employee status (lifecycle transition)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeStatusBody"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  # ──────────────────────────────────────────────
  # USERS (HRMS accounts linked to employees)
  # ──────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all HRMS users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HrmsUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create an HRMS user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrmsUser"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get the current authenticated user's profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrmsUser"
        "404":
          description: User not found / not set up yet

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
